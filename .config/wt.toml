                'hexdocs.pm',
                'preview.hex.pm',
                'ash-hq.org',
            ]
        }
    }
}
os.makedirs('.claude', exist_ok=True)
json.dump(settings, open('.claude/settings.local.json', 'w'), indent=2)
print('Claude sandbox settings written')
"
"""

# Install deps
setup = "mix deps.get --quiet"
